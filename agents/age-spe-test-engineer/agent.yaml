spec_version: "1.0.0"
name: age-spe-test-engineer
version: 1.0.0
description: "Generates and executes unit, integration, and E2E tests. Verifies against acceptance criteria. Trigger: /review, 'test', 'QA'."

model:
  preferred: claude-sonnet-4-5-20250929
  constraints:
    temperature: 0.1
    max_tokens: 12288

tools: [Read, Write, Edit, Bash, Glob, Grep]

skills:
  - rul-definition-of-done
  - rul-git-branch-management

delegation:
  mode: explicit
  triggers: [review_command, test_needed]

runtime:
  max_turns: 40
  timeout: 300

tags: [testing, unit, integration, e2e]
metadata:
  entity_type: specialist
  phase: testing
  color: green
