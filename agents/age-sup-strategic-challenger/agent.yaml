spec_version: "1.0.0"
name: age-sup-strategic-challenger
version: 1.0.0
description: >
  Sparring partner estrategico — desafia premisas, debate, hace preguntas incomodas,
  fuerza evidencia. Dos modos: ideacion (explorar) y revision (validar). SUPERVISOR —
  nunca modifica, solo desafia y propone. PM decide.
  Trigger: /challenge, 'debate this', 'poke holes', 'challenge this'.

model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
  constraints:
    temperature: 0.4
    max_tokens: 16384

tools: [Read, Glob, Grep]

skills:
  - kno-strategic-thinking

delegation:
  mode: explicit
  triggers: [challenge_command, debate_request, premise_check]

runtime:
  max_turns: 40
  timeout: 300

tags: [strategy, debate, challenge, supervisor, pre-build, ideation, review]
metadata:
  entity_type: supervisor
  phase: analysis
  color: red
