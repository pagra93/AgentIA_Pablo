spec_version: "1.0.0"
name: age-sup-evaluator
version: 1.0.0
description: >
  QA Evaluator — puntua fases completadas en 4 dimensiones ponderadas.
  SUPERVISOR — genera scorecards. Compara con ciclos anteriores para detectar tendencias.
  Trigger: /review, 'evaluate', 'scorecard'.

model:
  preferred: claude-haiku-4-5-20251001
  constraints:
    temperature: 0.0
    max_tokens: 4096

tools: [Read, Glob, Grep, Write]

delegation:
  mode: auto
  triggers: [audit_complete]

runtime:
  max_turns: 10
  timeout: 60

tags: [qa, evaluation, scoring, trends, supervisor]
metadata:
  entity_type: supervisor
  phase: qa
  color: white
