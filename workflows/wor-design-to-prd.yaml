# Workflow: Design to PRD
# Triggered by: /design-to-prd command
# Pipeline: Read Designs → Group Features → Analyze 6 Layers → Slice Vertical → Generate Story Tickets → Generate PRDs

name: wor-design-to-prd
description: "Analyze designs from Pencil, extract full-stack functionality, generate vertical story tickets + PRDs per feature."
version: 2.0.0

inputs:
  - name: design_source
    type: string
    default: "current Pencil editor"
    description: "Path to .pen file or 'current' for active editor"

steps:
  - id: read_designs
    action: "Open Pencil, get editor state, screenshot each screen/frame, read component structure"
    agent: age-spe-design-analyst
    outputs: [screens, components, layout]

  - id: group_features
    action: "Group screens into logical features. Each feature = one folder in docs/working-docs/"
    agent: age-spe-design-analyst
    depends_on: [read_designs]
    inputs:
      screens: ${{ steps.read_designs.outputs.screens }}
    outputs: [features, screen_to_feature_map]

  - id: read_registry
    action: "Read docs/project-registry.md (if exists). Extract existing assets (planned or active) to pass as context. If file doesn't exist, return empty."
    depends_on: [group_features]
    outputs: [existing_assets]

  - id: analyze_layers
    action: "For each feature, analyze all screens across 6 layers: UI, DB, API, Logic, Integrations, Edge Cases. Reference existing assets from registry (Usa) instead of re-deriving. New assets go to Crea. INTERNAL working step — data redistributed into stories."
    agent: age-spe-design-analyst
    depends_on: [group_features, read_registry]
    inputs:
      features: ${{ steps.group_features.outputs.features }}
      screens: ${{ steps.read_designs.outputs.screens }}
      components: ${{ steps.read_designs.outputs.components }}
      existing_assets: ${{ steps.read_registry.outputs.existing_assets }}
    outputs: [design_analyses, layer_data_per_screen]

  - id: slice_vertical_stories
    action: "Identify user flows across screens. Apply vertical slicing heuristics. Group 6-layer data into story-sized increments. Each story independently valuable, deployable, <=3 days, end-to-end. First story = survivable experiment."
    agent: age-spe-design-analyst
    depends_on: [analyze_layers]
    inputs:
      analyses: ${{ steps.analyze_layers.outputs.design_analyses }}
      features: ${{ steps.group_features.outputs.features }}
    outputs: [story_candidates, story_to_layer_map]

  - id: generate_story_tickets
    action: "For each story candidate, generate complete story ticket using kno-story-ticket-template. Fill Design section fully. Fill Notas tecnicas from Layers 2-6. Split Layer 4+6 between Criterios and Notas tecnicas. Mark JTBD sections [DERIVADO]. Generate DEV/QA test plans."
    agent: age-spe-design-analyst
    depends_on: [slice_vertical_stories]
    inputs:
      story_candidates: ${{ steps.slice_vertical_stories.outputs.story_candidates }}
      layer_map: ${{ steps.slice_vertical_stories.outputs.story_to_layer_map }}
    outputs: [stories]

  - id: generate_prds
    action: "For each feature, generate PRD using ski-prd-builder format. Problem-focused, no tech prescriptions."
    agent: age-spe-design-analyst
    skill: ski-prd-builder
    depends_on: [analyze_layers]
    inputs:
      analyses: ${{ steps.analyze_layers.outputs.design_analyses }}
    outputs: [prds]

  - id: save_documents
    action: "Create docs/working-docs/[feature]/ for each feature. Save stories.md (main output), design-reference.md (optional raw analysis), and prd.md."
    depends_on: [generate_story_tickets, generate_prds]
    inputs:
      features: ${{ steps.group_features.outputs.features }}
      stories: ${{ steps.generate_story_tickets.outputs.stories }}
      analyses: ${{ steps.analyze_layers.outputs.design_analyses }}
      prds: ${{ steps.generate_prds.outputs.prds }}
    outputs: [folders_created]

  - id: update_registry
    action: "For each story's 'Dependencias del Proyecto > Crea', add new assets to docs/project-registry.md with status 'planned'. Skip assets that already exist. Update Quick Reference and total count."
    depends_on: [save_documents]
    inputs:
      stories: ${{ steps.generate_story_tickets.outputs.stories }}
    outputs: [registry_updated, new_planned_assets]

  - id: present_summary
    action: "Show PM: features detected, stories per feature, suggested priority. Present two paths: Fast Track (/plan) or Full Pipeline (/analyze + /define)."
    depends_on: [save_documents, update_registry]
    inputs:
      features: ${{ steps.group_features.outputs.features }}
      stories: ${{ steps.generate_story_tickets.outputs.stories }}
    outputs: [summary]

error_handling:
  on_step_failure: inform_pm
  message: "Design analysis failed at step. Check if Pencil is open and designs are loaded."
